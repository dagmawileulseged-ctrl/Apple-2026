<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                outline: 1px solid black;
            }
            body {
                display: flex;
                flex-direction: column;
            }
            .tile {
                position: relative;
                width: 100%;
                max-width: 500px; /* Adjust to whatever width you need */
                height: 350px; /* Adjust to whatever height you need */
                overflow: hidden; /* Keeps everything cleanly clipped inside */
                border-radius: 8px; /* Sits above the background */
            }
            .image {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                object-fit: cover; /* Acts like background-size: cover; prevents stretching */
                z-index: 1;
            }
            .content {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 2; /* Forces it on top of the img tag */

                /* Styling the overlay look */
                background: rgba(
                    0,
                    0,
                    0,
                    0.4
                ); /* Optional: 40% black tint so text is readable */
                color: white;

                /* Center the text vertically and horizontally */
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                text-align: center;
                padding: 20px;
                box-sizing: border-box;
            }
        </style>
    </head>
    <body>
        <div class="tile">
            <div class="content">1</div>
            <div class="image">
                <img
                    src="../images/hero_iphone_family__be5jkzxszb1e_large_2x.jpg"
                    alt=""
                />
            </div>
        </div>
        <div class="tile">
            <div class="content">2</div>
            <div class="image">
                <img src="" alt="" />
            </div>
        </div>
        <div class="tile">
            <div class="content">3</div>
            <div class="image">
                <img src="" alt="" />
            </div>
        </div>
        <div class="tile">
            <div class="content">4</div>
            <div class="image">
                <img src="" alt="" />
            </div>
        </div>
    </body>
</html>
